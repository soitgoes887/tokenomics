# Score-based Portfolio Rebalancer Configuration
# This replaces the news-sentiment trading with fundamental score-based rebalancing

providers:
  broker: alpaca-paper

strategy:
  name: "score-rebalancer"
  capital_usd: 100000
  position_size_min_usd: 500
  position_size_max_usd: 5000
  max_open_positions: 100
  target_new_positions_per_month: 100

rebalancing:
  top_n_stocks: 100 # Hold top 100 stocks by fundamental score
  weighting: "score" # "score" = score-proportional, "equal" = equal weight
  max_position_pct: 5.0 # Max 5% per stock
  max_sector_pct: 25.0 # Max 25% per sector
  min_score: 50.0 # Only include stocks with score >= 50
  rebalance_threshold_pct: 20.0 # Only trade if >20% deviation from target
  min_trade_usd: 100.0 # Skip trades smaller than $100

# Scoring profiles — each runs independently with its own scorer, Redis namespace,
# and Alpaca account. Selected at runtime via SCORING_PROFILE env var.
scoring_profiles:
  tokenomics_v2_base:
    scorer_class: "FundamentalsScorer"
    redis_namespace: "fundamentals:v2_base"
    alpaca_api_key_env: "ALPACA_API_KEY"
    alpaca_secret_key_env: "ALPACA_SECRET_KEY"
    description: "Original 3-factor scorer (ROE/Debt/Growth)"
    exclusion_list: "config/exclusions/v2-exclusion-list.txt"

  tokenomics_v3_composite:
    scorer_class: "CompositeScorer"
    redis_namespace: "fundamentals:v3_composite"
    alpaca_api_key_env: "ALPACA_API_KEY_V3"
    alpaca_secret_key_env: "ALPACA_SECRET_KEY_V3"
    description: "4-factor composite (Value/Quality/Momentum/LowVol)"
    exclusion_list: "config/exclusions/v3-exclusion-list.txt"
    scorer_kwargs:
      value_weight: 0.30
      quality_weight: 0.35
      momentum_weight: 0.25
      lowvol_weight: 0.10
    post_filters:
      min_quality: 50.0                 # Hard rule: exclude Quality_sec < 50
      speculative_lowvol: 10.0          # Speculative filter: LowVol_sec < 10 AND ...
      speculative_value: 30.0           # ... Value_sec < 30 → exclude
      deduplicate_share_classes: true    # Keep only one share class per issuer

  tokenomics_v4_regime:
    scorer_class: "CompositeScorer"
    redis_namespace: "fundamentals:v4_regime"
    alpaca_api_key_env: "ALPACA_API_KEY_V4"
    alpaca_secret_key_env: "ALPACA_SECRET_KEY_V4"
    description: "4-factor composite + daily CGRS-lite geopolitical risk regime"
    exclusion_list: "config/exclusions/v4-exclusion-list.txt"
    scorer_kwargs:
      value_weight: 0.30
      quality_weight: 0.35
      momentum_weight: 0.25
      lowvol_weight: 0.10
    post_filters:
      min_quality: 50.0
      speculative_lowvol: 10.0
      speculative_value: 30.0
      deduplicate_share_classes: true
    regime_config:
      regime_namespace: "risk:regime"
      cyclical_sectors:
        - "Consumer Cyclicals"
        - "Industrials"
        - "Basic Materials"
        - "Energy"
      size_factors:
        LOW:      {default: 1.00, cyclical: 1.00}  # Full allocation
        MODERATE: {default: 1.00, cyclical: 0.75}  # 25% cut on cyclicals
        HIGH:     {default: 0.80, cyclical: 0.50}  # Light trim + 50% cyclical cut
        EXTREME:  {default: 0.60, cyclical: 0.00}  # Drop all cyclicals, 40% trim on defensives
      stale_regime_fallback: "MODERATE"
      max_regime_age_hours: 30
      vix_guard:
        enabled: true
        vix_panic_threshold: 45.0    # VIX >= 45 → trigger unconditionally
        vix_elevated_threshold: 35.0 # VIX >= 35 AND spike >= 10pts in 3 days → trigger
        vix_spike_points: 10.0
        vix_spike_days: 3
        cooldown_days: 15            # Max 1 emergency rebalance per 15 days

  default_profile: "tokenomics_v2_base"

trading:
  paper: true
  market_hours_only: true
  order_type: "market"
  time_in_force: "day"

logging:
  level: "INFO"
  trade_log: "logs/trades.log"
  decision_log: "logs/decisions.log"
  app_log: "logs/tokenomics.log"
  max_bytes: 10485760
  backup_count: 5
